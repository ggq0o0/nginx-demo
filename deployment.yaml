apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      # 【关键】定义一个卷，指向上面创建的 ConfigMap
      volumes:
      - name: nginx-config-volume   # 卷的名称
        configMap:
          name: nginx-custom-config  # 必须是上面 ConfigMap 的名字
          items:
          - key: default.conf        # 使用 ConfigMap 里的哪个键
            path: default.conf       # 在 Pod 里生成的文件叫什么名字

      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        # 【关键】将刚才定义的卷挂载到容器内的 Nginx 配置目录
        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d   # 挂载到这个目录下
        # 配置健康检查探针
        livenessProbe:
          httpGet:
            path: /health
            port: 80
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  annotations:
    # 使用 AWS NLB，支持固定 EIP
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    # 如果需要固定公网 IP，预先创建 EIP 并绑定
    #service.beta.kubernetes.io/aws-load-balancer-eip-allocations: eipalloc-xxxxxxxx
spec:
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
